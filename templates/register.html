<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Pradan Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-pradan { background-color: #22556e; }
        .text-pradan { color: #22556e; }
        .btn-pradan { background-color: #22556e; color: white; border: none; transition: 0.3s; }
        .btn-pradan:hover { background-color: #163b4d; color: white; }
    </style>
</head>
<body>
<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow border-0 p-4" style="width: 100%; max-width: 450px;">
        <h2 class="fw-bold text-pradan mb-4">Daftar Akun Baru</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold">Nama Lengkap</label>
                <input type="text" name="name" class="form-control bg-light" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Email</label>
                <input type="email" name="email" class="form-control bg-light" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" name="password" class="form-control bg-light" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Posisi / Role</label>
                <select name="role" class="form-select bg-light" required>
                    <option value="pm">Project Manager</option>
                    <option value="accounting">Accounting</option>
                    <option value="pa">PA</option>
                </select>
            </div>
            <button type="submit" class="btn btn-pradan w-100 fw-bold">Daftar</button>
            <div class="text-center mt-3 small">
                Sudah punya akun? <a href="{{ url_for('login') }}" class="text-pradan fw-bold text-decoration-none">Login</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
