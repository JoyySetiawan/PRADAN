<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pradan Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-pradan { background-color: #22556e; }
        .text-pradan { color: #22556e; }
        .btn-pradan { background-color: #22556e; color: white; border: none; transition: 0.3s; }
        .btn-pradan:hover { background-color: #163b4d; color: white; }
        .split-screen { min-height: 100vh; }
        /* Memastikan logo putih terlihat bagus jika ada background */
        .logo-container { background: white; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container-fluid p-0">
    <div class="row m-0 split-screen">
        
        <div class="col-lg-6 d-none d-lg-flex bg-pradan align-items-center justify-content-center text-center">
            <div>
                <div class="logo-container mb-4">
                    <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Pradan Logo" style="height: 80px;">
                </div>
                <h1 class="text-white fw-bold mb-3">Wujudkan Event Impian.</h1>
                <p class="text-white-50 lead px-5">Sistem Manajemen Terpadu untuk mengatur Klien, Vendor, dan Pekerjaan Pradan Organizer.</p>
            </div>
        </div>

        <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white">
            <div class="w-100" style="max-width: 400px; padding: 20px;">
                <h2 class="fw-bold text-pradan mb-1">Login</h2>
                <p class="text-muted mb-4">Selamat datang kembali! Silakan masuk ke akun Anda.</p>
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Email</label>
                        <input type="email" name="email" class="form-control form-control-lg bg-light fs-6" placeholder="nama@email.com" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg bg-light fs-6" placeholder="Min. 8 karakter" required>
                    </div>
                    
                    <button type="submit" class="btn btn-pradan btn-lg w-100 mb-3 fw-bold rounded-pill">Masuk</button>
                    
                    <div class="text-center mt-4">
                        <span class="text-muted small">Belum punya akun?</span>
                        <a href="{{ url_for('register') }}" class="text-pradan fw-bold text-decoration-none small">Daftar Sekarang</a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
