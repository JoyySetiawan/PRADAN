<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pradan Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-pradan { background-color: #22556e; }
        .text-pradan { color: #22556e; }
        .btn-pradan { background-color: #22556e; color: white; border: none; transition: 0.3s; }
        .btn-pradan:hover { background-color: #163b4d; color: white; }
        .split-screen { min-height: 100vh; }
    </style>
</head>
<body>
<div class="container-fluid p-0">
    <div class="row m-0 split-screen">
        <div class="col-lg-6 d-none d-lg-flex bg-pradan align-items-center justify-content-center text-center">
            <div class="text-white">
                <h1 class="fw-bold mb-3">Pradan Organizer</h1>
                <p class="lead px-5">Creating the Best Day. Ever.</p>
            </div>
        </div>
        <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white">
            <div class="w-100" style="max-width: 400px; padding: 20px;">
                <h2 class="fw-bold text-pradan mb-4">Login</h2>

                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email</label>
                        <input type="email" name="email" class="form-control bg-light" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Password</label>
                        <input type="password" name="password" class="form-control bg-light" required>
                    </div>
                    <button type="submit" class="btn btn-pradan w-100 fw-bold">Masuk</button>
                    <div class="text-center mt-4 small">
                        Belum punya akun? <a href="{{ url_for('register') }}" class="text-pradan fw-bold text-decoration-none">Daftar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
